<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

      BAS1C VISUALS — Ritesh Bera | Video Editor & Creative Portfolio

    <meta
      name="description"
      content="BAS1C VISUALS is the creative portfolio of Ritesh Bera, focused on video editing, reels, YouTube thumbnails, posters, book covers, brand visuals, and clean post-production for creators and businesses."
    />
    <meta name="author" content="Ritesh Bera" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#FAFAFA" />
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta
      property="og:title"
      content="BAS1C VISUALS — Ritesh Bera | Video Editor & Creative Portfolio"
    />
    <meta
      property="og:description"
      content="BAS1C VISUALS is the creative portfolio of Ritesh Bera, focused on video editing, reels, YouTube thumbnails, posters, book covers, brand visuals, and clean post-production for creators and businesses."
    />
    <meta property="og:image" content="https://your-domain.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-domain.com/" />
    <meta
      property="twitter:title"
      content="BAS1C VISUALS — Ritesh Bera | Video Editor & Creative Portfolio"
    />
    <meta
      property="twitter:description"
      content="BAS1C VISUALS is the creative portfolio of Ritesh Bera, focused on video editing, reels, YouTube thumbnails, posters, book covers, brand visuals, and clean post-production for creators and businesses."
    />
    <meta
      property="twitter:image"
      content="https://your-domain.com/og-image.jpg"
    />

    <link rel="icon" type="image/webp" href="/website-assets/Brand_Logo.webp" />
    <link rel="apple-touch-icon" href="/website-assets/Brand_Logo.webp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ritesh Bera",
        "jobTitle": "Video Editor & Creative Director",
        "url": "https://your-domain.com/",
        "sameAs": [
          "https://instagram.com/your-profile",
          "https://linkedin.com/in/your-profile"
        ],
        "brand": {
          "@type": "Brand",
          "name": "BAS1C VISUALS",
          "description": "Video editing, reels, YouTube thumbnails, posters, book covers, and brand visuals."
        }
      }
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              subtlePulse: {
                "0%, 100%": { opacity: 1, transform: "scale(1)" },
                "50%": { opacity: 0.85, transform: "scale(0.98)" },
              },
            },
            animation: {
              "subtle-pulse":
                "subtlePulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
            fontFamily: {
              sans: ['"Inter"', "sans-serif"],
              instrument: ['"Instrument Sans"', "sans-serif"],
              serif: ['"Instrument Serif"', "serif"],
            },
            colors: {
              white: "var(--color-white)",
              black: "var(--color-black)",
              themeBg: "var(--color-theme-bg)",
              neutral: {
                50: "var(--color-neutral-50)",
                100: "var(--color-neutral-100)",
                200: "var(--color-neutral-200)",
                300: "var(--color-neutral-300)",
                400: "var(--color-neutral-400)",
                500: "var(--color-neutral-500)",
                600: "var(--color-neutral-600)",
                700: "var(--color-neutral-700)",
                800: "var(--color-neutral-800)",
                900: "var(--color-neutral-900)",
                950: "var(--color-neutral-950)",
              },
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --color-theme-bg: #fbfbf8;
        --color-white: #ffffff;
        --color-black: #090908;
        --color-neutral-50: #fcfcf9;
        --color-neutral-100: #f1f1ec;
        --color-neutral-200: #deded6;
        --color-neutral-300: #c4c5bb;
        --color-neutral-400: #7f8078;
        --color-neutral-500: #60615a;
        --color-neutral-600: #454640;
        --color-neutral-700: #30312d;
        --color-neutral-800: #20211e;
        --color-neutral-900: #121310;
        --color-neutral-950: #090908;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
        background-color: var(--color-theme-bg);
      }
      body {
        background-color: var(--color-theme-bg);
        color: var(--color-black);
      }
      ::selection {
        background-color: var(--color-black);
        color: var(--color-white);
      }
      @media print {
        nav,
        footer,
        button {
          display: none !important;
        }
      }
    </style>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
